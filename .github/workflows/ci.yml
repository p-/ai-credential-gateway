name: Go
on: [push]
jobs:

  build:
    name: Build
    runs-on: "ubuntu-24.04"
    steps:

    - name: Set up Go
      uses: actions/setup-go@v6.4.0
      with:
        go-version: '1.26'
      id: go

    - name: Check out code
      uses: actions/checkout@v6

    - name: Build
      run: go build

    - name: Test
      run: go test ./...